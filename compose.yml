services:
  backend:
    build:
      context: ./backend/vigilapp
      dockerfile: Dockerfile
    container_name: vigilapp-backend
    restart: always
    ports:
      - "${SPRING_PORT:-8080}:8080"
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-}
      DB_HOST: ${SUPABASE_DB_HOST:-}
      DB_PORT: ${SUPABASE_DB_PORT:-6543}
      DB_NAME: ${SUPABASE_DB_NAME:-postgres}
      DB_USER: ${SUPABASE_DB_USER:-}
      DB_PASSWORD: ${SUPABASE_DB_PASSWORD:-}
    networks:
      - mi-red

  frontend:
    build:
      context: ./frontend/vigilapp
      dockerfile: Dockerfile
    container_name: vigilapp-frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-4000}:4000"
    environment:
      - BACKEND_HOST=vigilapp-backend
    networks:
      - mi-red
    depends_on:
      - backend

networks:
  mi-red:
    driver: bridge