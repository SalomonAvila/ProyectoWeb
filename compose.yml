services:
  postgres:
    image: postgres:15
    container_name: postgres-local
    restart: always
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - mi-red
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "${PGADMIN_PORT}:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mi-red

  backend:
    build:
      context: ./backend/vigilapp
      dockerfile: Dockerfile
    container_name: vigilapp-backend
    restart: always
    ports:
      - "${SPRING_PORT}:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mi-red

  frontend:
    build:
      context: ./frontend/vigilapp
      dockerfile: Dockerfile
    container_name: vigilapp-frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-4000}:4000"
    networks:
      - mi-red
    depends_on:
      - backend

volumes:
  postgres_data:

networks:
  mi-red:
    driver: bridge