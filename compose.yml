services:
  backend:
    build:
      context: ./backend/vigilapp
      dockerfile: Dockerfile
    container_name: vigilapp-backend
    restart: always
    ports:
      - "${SPRING_PORT:-8080}:8080"
    environment:
      DB_HOST: ${SUPABASE_DB_HOST:?Define SUPABASE_DB_HOST en tu .env local}
      DB_PORT: ${SUPABASE_DB_PORT:?Define SUPABASE_DB_PORT en tu .env local}
      DB_NAME: ${SUPABASE_DB_NAME:?Define SUPABASE_DB_NAME en tu .env local}
      DB_USER: ${SUPABASE_DB_USER:?Define SUPABASE_DB_USER en tu .env local}
      DB_PASSWORD: ${SUPABASE_DB_PASSWORD:?Define SUPABASE_DB_PASSWORD en tu .env local}
    networks:
      - mi-red

  frontend:
    build:
      context: ./frontend/vigilapp
      dockerfile: Dockerfile
    container_name: vigilapp-frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-4000}:4000"
    environment:
      - BACKEND_HOST=vigilapp-backend
    networks:
      - mi-red
    depends_on:
      - backend

networks:
  mi-red:
    driver: bridge