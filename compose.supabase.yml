version: '3.8'
services:
  # This compose file is an alternative that uses an external Supabase Postgres instance
  # instead of the local `postgres` service. Use it together with the main `compose.yml`
  # via: `docker compose -f compose.yml -f compose.supabase.yml up -d --build`

  backend:
    build:
      context: ./backend/vigilapp
      dockerfile: Dockerfile
    container_name: vigilapp-backend
    restart: always
    ports:
      - "${SPRING_PORT}:8080"
    environment:
      # Preferred: provide a full JDBC URL via SPRING_DATASOURCE_URL
      # Example: jdbc:postgresql://db.xxxxx.supabase.co:5432/vigilapp_db?sslmode=require
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - DB_USER=${SUPABASE_DB_USER}
      - DB_PASSWORD=${SUPABASE_DB_PASSWORD}
      - DB_HOST=${SUPABASE_DB_HOST}
      - DB_PORT=${SUPABASE_DB_PORT}
      - DB_NAME=${SUPABASE_DB_NAME}
    networks:
      - mi-red

  frontend:
    build:
      context: ./frontend/vigilapp
      dockerfile: Dockerfile
    container_name: vigilapp-frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-4000}:4000"
    environment:
      - BACKEND_HOST=vigilapp-backend
    networks:
      - mi-red
    depends_on:
      - backend

networks:
  mi-red:
    driver: bridge
