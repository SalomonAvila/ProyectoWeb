spring.application.name=vigilapp

## Prefer explicit JDBC URL when provided (use Supabase JDBC or DATABASE URL converted to JDBC)
# You can set SPRING_DATASOURCE_URL to a full JDBC connection string (recommended for Supabase)
# Example: jdbc:postgresql://db.abcd.supabase.co:5432/vigilapp_db?sslmode=require
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:${POSTGRES_PORT:5432}}/${DB_NAME:${POSTGRES_DB:vigilapp_db}}}
spring.datasource.username=${DB_USER:${POSTGRES_USER:postgres}}
spring.datasource.password=${DB_PASSWORD:${POSTGRES_PASSWORD:postgres}}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.thymeleaf.check-template-location=false
server.port=${PORT:${SPRING_PORT:8080}}
spring.jpa.show-sql=true

