@if (items.length > 0) {
	<div class="fixed left-1/2 top-4 z-50 flex w-[calc(100%-2rem)] max-w-md -translate-x-1/2 flex-col gap-3 sm:left-auto sm:right-4 sm:translate-x-0">
		@for (toast of items; track toast.id) {
			<article class="rounded-3xl border border-white/70 bg-slate-950/95 px-4 py-3 text-white shadow-2xl backdrop-blur-xl" [ngClass]="getToneClass(toast.kind)">
				<div class="flex items-start gap-3">
					<div class="flex h-10 w-10 items-center justify-center rounded-2xl text-sm font-bold" [ngClass]="getBadgeClass(toast.kind)">
						{{ getIcon(toast.kind) }}
					</div>
					<div class="min-w-0 flex-1">
						<p class="text-sm font-semibold text-white">{{ toast.title }}</p>
						<p class="mt-1 text-xs leading-5 text-white/80">{{ toast.message }}</p>
					</div>
				</div>
			</article>
		}
	</div>
}
