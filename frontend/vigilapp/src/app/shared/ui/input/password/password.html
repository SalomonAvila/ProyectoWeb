<div class="space-y-2 animate-fade-in" [style.animation-delay]="delay">
  <label for="password" class="text-sm font-medium text-gray-700 block transition-all duration-300 hover:text-blue-600">
    {{ label }}
  </label>

  <div class="relative group">
    <input
      [type]="showPassword() ? 'text' : 'password'"
      id="password"
      [placeholder]="placeholder"
      [(ngModel)]="password"
      (ngModelChange)="onPasswordInput($event)"
      name="password"
      class="w-full px-4 py-3 sm:py-3.5 rounded-xl text-base focus:outline-none focus:ring-2 focus:ring-blue-400 pr-12 backdrop-blur-md bg-white/60 border border-white/40 hover:bg-white/70 transition-all duration-300 ease-out hover:scale-105 hover:shadow-lg hover:shadow-blue-200/50 focus:scale-105"
      [class.ring-2]="password"
      [class.ring-blue-300]="password"
      [class.shadow-lg]="password"
      [class.shadow-blue-200/50]="password"
    />

    <button type="button" (click)="togglePasswordVisibility()"
      class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition-all duration-300 hover:scale-125 active:scale-95">
      <svg *ngIf="!showPassword()" class="w-5 h-5 transition-all duration-300 group-hover:opacity-100" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
      </svg>

      <svg *ngIf="showPassword()" class="w-5 h-5 transition-all duration-300 group-hover:opacity-100" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path>
      </svg>
    </button>
  </div>
</div>
