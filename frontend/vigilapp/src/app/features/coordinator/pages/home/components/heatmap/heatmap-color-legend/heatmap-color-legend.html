<div class="rounded-3xl border border-slate-200 bg-white/95 p-6 sm:p-7 shadow-sm">
	<div class="flex flex-col gap-6 lg:flex-row lg:items-start lg:justify-between lg:gap-8">
		<div class="max-w-2xl pr-1 sm:pr-0">
			<p class="text-xs font-semibold uppercase tracking-[0.3em] text-slate-500">Colorimetría</p>
			<h3 class="mt-3 text-lg font-semibold text-slate-900 leading-tight">Lectura rápida de intensidad</h3>
			<p class="mt-3 text-sm leading-7 text-slate-600">
				Los colores del mapa representan el número de accidentes por zona. Mientras más cálido el color, mayor es la concentración de incidentes.
			</p>
		</div>

		<div class="grid grid-cols-1 gap-3 sm:grid-cols-2 lg:min-w-136 lg:grid-cols-4 lg:gap-4">
			<div *ngFor="let item of items" class="flex items-center gap-4 rounded-2xl border border-slate-100 bg-slate-50 px-5 py-5 sm:px-4 sm:py-4">
				<span class="flex-none aspect-square h-4 w-4 rounded-full ring-4 ring-white shrink-0" [style.backgroundColor]="item.color"></span>
				<div class="min-w-0">
					<div class="text-sm font-semibold text-slate-900">{{ item.label }}</div>
					<div class="text-xs text-slate-500">{{ item.description }}</div>
				</div>
			</div>
		</div>
	</div>
</div>
