<section>
	<h2 class="text-sm font-semibold text-slate-500 uppercase tracking-wider mb-4 sm:mb-6 px-1">
		Turnos Activos
	</h2>

	<div class="space-y-3">
		<button
			type="button"
			*ngFor="let shift of shifts"
			(click)="shiftSelected.emit(shift)"
			class="w-full bg-white/90 rounded-xl sm:rounded-2xl p-4 sm:p-5 text-left border border-slate-200 hover:border-slate-300 shadow-sm transition-all"
		>
			<div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
				<div class="flex items-center gap-3 sm:gap-4 min-w-0 flex-1">
					<div class="w-10 h-10 sm:w-12 sm:h-12 bg-emerald-100 rounded-full flex items-center justify-center flex-shrink-0">
						<div class="w-2.5 h-2.5 bg-emerald-500 rounded-full animate-pulse"></div>
					</div>

					<div class="min-w-0 flex-1">
						<div class="font-semibold text-slate-900 mb-0.5 text-sm sm:text-base truncate">{{ shift.zoneName }}</div>
						<div class="text-xs sm:text-sm text-slate-600 truncate">{{ shift.teacherName }}</div>
						<div class="flex items-center gap-2 text-xs text-slate-500 mt-1">
							<span>{{ shift.startTime }} - {{ shift.endTime }}</span>
						</div>
					</div>
				</div>

				<div class="flex items-center gap-4 self-start sm:self-auto">
					<div *ngIf="shift.patrolCount !== undefined" class="flex items-center gap-2 px-3 py-1.5 bg-sky-50 rounded-lg">
						<span class="text-sm font-medium text-sky-600">{{ shift.patrolCount }}</span>
					</div>

					<span class="text-xs text-slate-400">&gt;</span>
				</div>
			</div>
		</button>
	</div>
</section>
