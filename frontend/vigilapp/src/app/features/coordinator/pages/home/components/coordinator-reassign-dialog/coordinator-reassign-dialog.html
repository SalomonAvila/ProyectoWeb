<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/40 backdrop-blur-sm">
	<div class="w-full max-w-lg max-h-[90vh] overflow-y-auto bg-white rounded-3xl shadow-2xl border border-slate-200">
		<div class="flex items-start justify-between gap-4 p-6 border-b border-slate-100">
			<div>
				<h3 class="text-2xl font-semibold text-slate-900">Reasignar Turno</h3>
				<p class="text-sm text-slate-500">Selecciona un docente disponible para cubrir el turno</p>
			</div>

			<button type="button" (click)="close.emit()" class="text-slate-400 hover:text-slate-700 text-2xl leading-none">&times;</button>
		</div>

		<div *ngIf="shift" class="space-y-6 p-6">
			<div class="bg-rose-50 rounded-2xl p-5 border border-rose-200">
				<h4 class="font-semibold text-rose-900 mb-2">{{ shift.zoneName }}</h4>
				<p class="text-sm text-rose-700">
					{{ shift.startTime }} - {{ shift.endTime }} · Docente original: {{ shift.teacherName }}
				</p>
			</div>

			<div class="space-y-2 max-h-80 overflow-y-auto">
				<label class="text-sm font-medium text-slate-700 block mb-3">Docentes Disponibles</label>

				<button
					type="button"
					*ngFor="let teacher of availableTeachers"
					(click)="confirm.emit({ shift: shift, teacherId: teacher.id })"
					class="w-full flex items-center gap-4 p-4 bg-white border border-slate-200 hover:border-slate-300 rounded-xl text-left transition-all"
				>
					<div class="w-10 h-10 bg-sky-100 rounded-full flex items-center justify-center flex-shrink-0">
						<span class="text-sky-600 font-semibold">{{ teacher.name.charAt(0) }}</span>
					</div>

					<div class="flex-1 min-w-0">
						<p class="font-medium text-slate-900">{{ teacher.name }}</p>
						<p class="text-sm text-slate-600">{{ teacher.department }}</p>
					</div>
				</button>
			</div>
		</div>
	</div>
</div>
