<section>
	<h2 class="text-sm font-semibold text-slate-500 uppercase tracking-wider mb-4 sm:mb-6 px-1">
		Actividad Reciente
	</h2>

	<div class="bg-white/90 rounded-2xl sm:rounded-3xl divide-y divide-slate-200/70 overflow-hidden border border-slate-200 shadow-sm">
		<div *ngFor="let incident of incidents" class="p-4 sm:p-5 hover:bg-slate-50 transition-colors">
			<div class="flex items-start justify-between gap-3">
				<div class="flex-1 min-w-0">
					<div class="flex items-center gap-2 mb-1">
						<span
							class="px-2 py-0.5 rounded text-xs font-medium"
							[class.bg-rose-100]="incident.severity === 'S3'"
							[class.text-rose-700]="incident.severity === 'S3'"
							[class.bg-amber-100]="incident.severity === 'S2'"
							[class.text-amber-700]="incident.severity === 'S2'"
							[class.bg-yellow-100]="incident.severity === 'S1'"
							[class.text-yellow-700]="incident.severity === 'S1'"
						>
							{{ incident.severity }}
						</span>

						<span class="text-xs text-slate-500">
							{{ incident.timestamp | date: 'HH:mm' }}
						</span>
					</div>

					<p class="text-sm text-slate-900 mb-1">{{ incident.description }}</p>
					<p class="text-xs text-slate-600">{{ incident.zoneName }} - {{ incident.teacherName }}</p>
				</div>
			</div>
		</div>
	</div>
</section>
