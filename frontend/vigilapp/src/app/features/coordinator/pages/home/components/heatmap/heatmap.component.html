<section class="space-y-6 sm:space-y-7">
	<div class="flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between sm:gap-6">
		<div>
			<h2 class="px-2 text-sm font-semibold uppercase tracking-wider text-slate-500">Mapa de calor</h2>
			<p class="px-1 mt-2 text-sm leading-6 text-slate-600">Las zonas conservan la capa de calor aunque cambies la base del mapa.</p>
		</div>

		<button type="button" class="inline-flex items-center justify-center rounded-full border border-slate-200 bg-white px-4 py-3 text-sm font-medium text-slate-700 shadow-sm transition hover:border-slate-300 hover:text-slate-950" (click)="toggleBaseLayer()">
			{{ mapMode === 'satellite' ? 'Ver mapa simple' : 'Ver satélite' }}
		</button>
	</div>

	<div class="pt-4 sm:pt-6">
		<app-heatmap-color-legend />
	</div>

	<div class="overflow-hidden rounded-4xl border border-slate-200 bg-white shadow-sm" style="position: relative; z-index: 0;">
		<div class="h-128 w-full" style="position: relative; z-index: 0;">
			<div #mapContainer class="h-full w-full" style="position: relative; z-index: auto;"></div>
		</div>
	</div>
</section>
