<!--  Este es el div principal de la aplicacion -->
<div class="min-h-screen relative bg-linear-to-br from-slate-50 via-blue-50 to-cyan-50">
  <div class="h-screen flex items-center justify-center px-4 sm:px-6">
    <div class="w-full max-w-md animate-fade-in">
      <!-- Glass login card -->
      <div
        class="backdrop-blur-xl bg-white/40 border border-white/60 rounded-3xl sm:rounded-4xl p-6 sm:p-10 relative overflow-hidden shadow-2xl transition-all duration-500 hover:shadow-3xl hover:bg-white/50">
        <!-- Mirror shine -->
        <div class="absolute top-0 left-0 right-0 h-px">
        </div>
        <div class="absolute -top-20 -right-20 w-48 h-48 bg-blue-500/10 rounded-full blur-3xl animate-pulse"></div>
        <div class="absolute -bottom-16 -left-16 w-40 h-40 bg-purple-500/8 rounded-full blur-3xl animate-pulse"
          style="animation-delay: 1s;"></div>

        <div class="relative z-10">
          <!-- Logo/Icon -->
          <div class="text-center mb-8 sm:mb-10 animate-fade-in" style="animation-delay: 0.2s;">
            <div
              class="mx-auto w-16 h-16 sm:w-20 sm:h-20 bg-gradient-to-br from-blue-500 to-cyan-400 rounded-2xl sm:rounded-3xl flex items-center justify-center mb-4 sm:mb-6 shadow-xl shadow-blue-500/25 transition-all duration-300 hover:scale-110 active:scale-95">
              <!-- Shield Icon SVG -->
              <svg class="w-8 h-8 sm:w-10 sm:h-10 text-white transition-transform duration-300 hover:rotate-6"
                fill="currentColor" viewBox="0 0 24 24">
                <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z" />
              </svg>
            </div>
            <h1
              class="text-3xl sm:text-4xl font-semibold text-gray-900 mb-2 sm:mb-3 tracking-tight transition-all duration-500">
              Bienvenido
            </h1>
            <p class="text-base sm:text-lg text-gray-500 transition-all duration-500">
              Sistema de Vigilancia Docente
            </p>
          </div>

          <!-- Login Form -->
          <form class="space-y-4 sm:space-y-5">
            <!-- Email Input -->
            <div class="space-y-2 animate-fade-in" style="animation-delay: 0.3s;">
              <label for="email"
                class="text-sm font-medium text-gray-700 block transition-all duration-300 hover:text-blue-600">
                Correo Electrónico
              </label>
              <input id="email" type="email" placeholder="correo@colegio.edu" [(ngModel)]="email" name="email"
                class="w-full px-4 py-3 sm:py-3.5 rounded-xl text-base focus:outline-none focus:ring-2 focus:ring-blue-400 backdrop-blur-md bg-white/60 border border-white/40 hover:bg-white/70 transition-all duration-300 ease-out hover:scale-105 hover:shadow-lg hover:shadow-blue-200/50 focus:scale-105"
                [class.ring-2]="email" [class.ring-blue-300]="email" [class.shadow-lg]="email"
                [class.shadow-blue-200/50]="email" />
            </div>

            <!-- Password Input -->
            <div class="space-y-2 animate-fade-in" style="animation-delay: 0.4s;">
              <label for="password"
                class="text-sm font-medium text-gray-700 block transition-all duration-300 hover:text-blue-600">
                Contraseña
              </label>
              <div class="relative group">
                <input [type]="showPassword ? 'text' : 'password'" id="password" placeholder="••••••••"
                  [(ngModel)]="password" name="password"
                  class="w-full px-4 py-3 sm:py-3.5 rounded-xl text-base focus:outline-none focus:ring-2 focus:ring-blue-400 pr-12 backdrop-blur-md bg-white/60 border border-white/40 hover:bg-white/70 transition-all duration-300 ease-out hover:scale-105 hover:shadow-lg hover:shadow-blue-200/50 focus:scale-105"
                  [class.ring-2]="password" [class.ring-blue-300]="password" [class.shadow-lg]="password"
                  [class.shadow-blue-200/50]="password" />
                <button type="button" (click)="togglePasswordVisibility()"
                  class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition-all duration-300 hover:scale-125 active:scale-95">
                  <!-- Eye Icon -->
                  <svg *ngIf="!showPassword" class="w-5 h-5 transition-all duration-300 group-hover:opacity-100"
                    fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z">
                    </path>
                  </svg>
                  <!-- Eye Off Icon -->
                  <svg *ngIf="showPassword" class="w-5 h-5 transition-all duration-300 group-hover:opacity-100"
                    fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21">
                    </path>
                  </svg>
                </button>
              </div>
            </div>

            <!-- Remember Me Checkbox -->
            <div class="flex items-center justify-center gap-2.5 pt-2 animate-fade-in" style="animation-delay: 0.5s;">
              <div class="relative">
                <input id="remember" type="checkbox" [(ngModel)]="rememberMe" name="rememberMe" class="sr-only peer" />
                <label for="remember" class="flex items-center justify-center w-6 h-6 rounded-lg border-2 border-gray-300 bg-white/50 cursor-pointer transition-all duration-300 ease-out
                    peer-checked:bg-gradient-to-br peer-checked:from-blue-500 peer-checked:to-cyan-400 peer-checked:border-blue-500 peer-checked:scale-110
                    hover:border-blue-300 hover:shadow-lg hover:shadow-blue-200/50 hover:scale-105
                    peer-focus:ring-2 peer-focus:ring-blue-400 peer-focus:ring-offset-2">
                  <svg class="w-4 h-4 text-white transition-all duration-300" [class.scale-100]="rememberMe"
                    [class.opacity-100]="rememberMe" [class.scale-0]="!rememberMe" [class.opacity-0]="!rememberMe"
                    fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="3" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path d="M5 13l4 4L19 7"></path>
                  </svg>
                </label>
              </div>
              <label for="remember"
                class="text-sm font-medium text-gray-700 cursor-pointer select-none transition-all duration-300 hover:text-blue-600">
                Recordar contraseña
              </label>
            </div>

            <!-- Submit Button -->
            <button type="button"
              class="w-full mt-6 sm:mt-8 py-3 sm:py-3.5 bg-gradient-to-r from-blue-500 to-cyan-400 hover:from-blue-600 hover:to-cyan-500 text-white font-medium rounded-xl transition-all duration-300 shadow-xl shadow-blue-500/25 hover:shadow-2xl hover:shadow-blue-500/35 active:scale-95 active:shadow-lg hover:scale-105 animate-fade-in"
              style="animation-delay: 0.6s;">
              Iniciar Sesión
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
<!-- Eye Icon -->
<!-- Remember Me Checkbox -->
<div class="flex items-center justify-center gap-2.5 pt-2">
  <div class="relative">
    <input id="remember" type="checkbox" [(ngModel)]="rememberMe" name="rememberMe" class="sr-only peer" />
    <label for="remember" class="flex items-center justify-center w-6 h-6 rounded-lg border-2 border-gray-300 bg-white/50 cursor-pointer transition-all duration-300 ease-out
                    peer-checked:bg-linear-to-br peer-checked:from-blue-500 peer-checked:to-cyan-400 peer-checked:border-blue-500 peer-checked:scale-110
                    hover:border-blue-300 hover:shadow-lg hover:shadow-blue-200/50
                    peer-focus:ring-2 peer-focus:ring-blue-400 peer-focus:ring-offset-2">
      <svg class="w-4 h-4 text-white transition-all duration-300" [class.scale-100]="rememberMe"
        [class.opacity-100]="rememberMe" [class.scale-0]="!rememberMe" [class.opacity-0]="!rememberMe" fill="none"
        stroke-linecap="round" stroke-linejoin="round" stroke-width="3" viewBox="0 0 24 24" stroke="currentColor">
        <path d="M5 13l4 4L19 7"></path>
      </svg>
    </label>
  </div>
  <label for="remember" class="text-sm font-medium text-gray-700 cursor-pointer select-none">
    Recordar contraseña
  </label>
</div>
<!-- Este es el botton de iniciar sesion -->
<button type="button"
  class="w-full mt-6 sm:mt-8 py-3 sm:py-3.5 bg-linear-to-r from-blue-500 to-cyan-400 hover:from-blue-600 hover:to-cyan-500 text-white font-medium rounded-xl transition-all duration-200 shadow-xl shadow-blue-500/25 hover:shadow-2xl hover:shadow-blue-500/35 active:scale-95 active:shadow-lg hover:scale-[1.02]">
  Iniciar Sesión
</button>
